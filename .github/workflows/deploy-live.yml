# Deploy to live EC2 — triggered by app repo release or manual dispatch.
#
# Automated: app repo release.yml calls this after ECR push.
# Manual/rollback: Actions → "Deploy Live" → Run workflow → pick
#   service + enter any previous release tag.
#
# Only semver release tags are accepted — no :latest in production.
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, LIVE_SSH_KEY
# Required GitHub Variables:
#   LIVE_HOST_IP

name: Deploy Live

on:
  workflow_call:
    inputs:
      service:
        type: string
        required: true
        description: 'Service to deploy (bot-node / ai-inference / web-vue)'
      tag:
        type: string
        required: true
        description: 'Release tag to deploy (e.g., v1.2.0)'

  workflow_dispatch:
    inputs:
      service:
        type: choice
        description: 'Service to deploy'
        required: true
        options:
          - bot-node
          - ai-inference
          - web-vue
          - all
      tag:
        type: string
        description: 'Release tag to deploy (e.g., v1.2.0). Must exist in ECR.'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout crypto-infra
        uses: actions/checkout@v4
        with:
          repository: mate-kovacs89/crypto-infra

      - name: Validate tag format
        run: |
          TAG="${{ inputs.tag }}"
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Tag must be semver (e.g., v1.2.0). Got: $TAG"
            exit 1
          fi

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: List available tags in ECR
        run: |
          SERVICE="${{ inputs.service }}"
          echo "### Available tags in ECR:" >> $GITHUB_STEP_SUMMARY

          list_tags() {
            local repo="$1"
            local tags
            tags=$(aws ecr describe-images --repository-name "$repo" --region eu-north-1 \
              --query 'sort_by(imageDetails,&imagePushedAt)[*].imageTags[0]' --output text 2>/dev/null | tr '\t' '\n' | grep '^v' | sort -Vr | head -10)
            echo "**$repo**: $tags" >> $GITHUB_STEP_SUMMARY
            echo "$repo: $tags"
          }

          case "$SERVICE" in
            bot-node)     list_tags "crypto-bot-node" ;;
            ai-inference) list_tags "crypto-ai-python" ;;
            web-vue)      list_tags "crypto-web-vue" ;;
            all)
              list_tags "crypto-bot-node"
              list_tags "crypto-ai-python"
              list_tags "crypto-web-vue"
              ;;
          esac

      - name: Verify image exists in ECR
        run: |
          SERVICE="${{ inputs.service }}"
          TAG="${{ inputs.tag }}"

          verify_image() {
            local repo="$1"
            local full_tag="$2"
            echo "Checking $repo:$full_tag in ECR..."
            if ! aws ecr describe-images --repository-name "$repo" --image-ids imageTag="$full_tag" --region eu-north-1 > /dev/null 2>&1; then
              echo "::error::Image $repo:$full_tag not found in ECR. Build a release first."
              exit 1
            fi
            echo "✓ $repo:$full_tag exists"
          }

          case "$SERVICE" in
            bot-node)     verify_image "crypto-bot-node" "$TAG" ;;
            ai-inference) verify_image "crypto-ai-python" "${TAG}-inference" ;;
            web-vue)      verify_image "crypto-web-vue" "$TAG" ;;
            all)
              verify_image "crypto-bot-node" "$TAG"
              verify_image "crypto-ai-python" "${TAG}-inference"
              verify_image "crypto-web-vue" "$TAG"
              ;;
          esac

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.LIVE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ vars.LIVE_HOST_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy
        env:
          LIVE_HOST: ubuntu@${{ vars.LIVE_HOST_IP }}
          SSH_KEY: ~/.ssh/deploy_key
        run: |
          chmod +x scripts/deploy-live.sh
          scripts/deploy-live.sh --service "${{ inputs.service }}" --tag "${{ inputs.tag }}"
