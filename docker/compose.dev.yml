# Local development compose — ALL services running.
#
# Run:
#   cd crypto-infra
#   docker compose -f docker/compose.dev.yml up -d
#
# All passwords are DEV-ONLY. Production uses RDS + SSM.

name: crypto-ai-dev

networks:
  crypto-net:
    name: crypto-net
    driver: bridge

volumes:
  mysql-data:
    driver: local

services:
  mysql:
    image: mysql:8.0
    container_name: crypto-ai-mysql
    restart: unless-stopped
    networks:
      - crypto-net
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: dev_root_change_me
      MYSQL_DATABASE: cryptobot_ai
      MYSQL_USER: cryptobot
      MYSQL_PASSWORD: dev_change_me
      TZ: Europe/Budapest
    volumes:
      - mysql-data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+02:00
      - --max-connections=200
      - --innodb-buffer-pool-size=512M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pdev_root_change_me"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ai-inference:
    build:
      context: ../../crypto-ai-python
      dockerfile: Dockerfile
      target: inference
    container_name: crypto-ai-inference
    restart: unless-stopped
    networks:
      - crypto-net
    ports:
      - "127.0.0.1:50051:50051"
    environment:
      MODEL_PATH: /app/models/model.lgbm
    volumes:
      - ../../crypto-ai-python/models:/app/models
    healthcheck:
      test: ["CMD", "python", "-c", "import grpc;ch=grpc.insecure_channel('localhost:50051');grpc.channel_ready_future(ch).result(timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  bot-node:
    build:
      context: ../../crypto-bot-node
      dockerfile: Dockerfile
    container_name: crypto-ai-bot-node
    restart: unless-stopped
    networks:
      - crypto-net
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: cryptobot
      DB_PASSWORD: dev_change_me
      DB_NAME: cryptobot_ai
      INFERENCE_GRPC_URL: ai-inference:50051
      HTTP_PORT: "3000"
      NODE_ENV: development
      JWT_SECRET: dev_jwt_secret_not_for_production_0000000000000000
      MASTER_ENCRYPTION_KEY: dev_master_key_not_for_production_00000000000000
      INIT_ADMIN_USERNAME: admin
      INIT_ADMIN_PASSWORD: admin1234
      INIT_ADMIN_EMAIL: admin@localhost
    depends_on:
      mysql:
        condition: service_healthy
      ai-inference:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>{if(!r.ok)throw 1})"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  web-vue:
    build:
      context: ../../crypto-web-vue
      dockerfile: Dockerfile
    container_name: crypto-ai-web-vue
    restart: unless-stopped
    networks:
      - crypto-net
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - bot-node
